<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Activity Tracking</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4ca.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top">
        <h1>Activity Tracking</h1>
        <p class="subtitle">Haftalık, aylık ve yıllık hedeflerini birim bazında takip et.</p>
      </header>

      <section class="panel controls">
        <div class="period-switch" role="tablist" aria-label="Zaman aralığı seçimi">
          <button data-period="week" class="active">Hafta</button>
          <button data-period="month">Ay</button>
          <button data-period="year">Yıl</button>
        </div>
        <div class="period-nav">
          <button id="prevPeriod" aria-label="Önceki">◀</button>
          <span id="periodLabel"></span>
          <button id="nextPeriod" aria-label="Sonraki">▶</button>
        </div>
      </section>

      <section class="panel">
        <h2>Tüm Kategoriler Özeti</h2>
        <div id="overallBattery" class="battery-wrap"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Kategoriler</h2>
          <form id="addCategoryForm" class="add-category-form">
            <input id="newCategoryName" maxlength="24" placeholder="Yeni kategori adı" required />
            <input id="newCategoryEmoji" maxlength="2" placeholder="🧩" aria-label="Kategori görseli" />
            <button type="submit">Ekle</button>
          </form>
        </div>
        <div id="categoryList" class="category-list"></div>
      </section>

      <section class="panel">
        <h2>Gerçekleşme Ekle</h2>
        <form id="addLogForm" class="log-form">
          <label>
            Kategori
            <select id="logCategory" required></select>
          </label>
          <label>
            Tarih
            <input id="logDate" type="date" required />
          </label>
          <label>
            Birim
            <input id="logUnits" type="number" min="1" step="1" value="1" required />
          </label>
          <button type="submit">Kaydet</button>
        </form>
      </section>

      <section class="panel">
        <h2>Geçmiş Kayıtlar</h2>
        <ul id="logList" class="log-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
